name: Deploy to Azure Container Apps

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Login to ACR
      run: |
        echo ${{ secrets.ACR_PASSWORD }} | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

    - name: Build Docker Image
      run: |
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/churn-api:${{ github.sha }} .

    - name: Push Image
      run: |
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/churn-api:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production   # 👈 THIS IS THE KEY

    steps:
    - name: Login to Azure
      uses: azure/login@v1
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}

    - name: Deploy to Azure
      run: |
        az containerapp update \
          --name churn-api-app \
          --resource-group mlops-rg \
          --image ${{ secrets.ACR_LOGIN_SERVER }}/churn-api:${{ github.sha }}